# ═══════════════════════════════════════════════════════════════
#                    赚钱雷达 (MoneyRadar) 配置
#                      Version: 1.0.0 (基于 TrendRadar 改造)
# ═══════════════════════════════════════════════════════════════


# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: false


# ===============================================================
# 1.5 调度系统
# ===============================================================
schedule:
  enabled: true
  preset: "morning_evening"   # 早报+晚报模式


# ===============================================================
# 2. 热榜平台 —— 赚钱雷达不使用（关闭）
# ===============================================================
platforms:
  enabled: false              # 关闭通用热榜（只监控 RSS 源）


# ===============================================================
# 3. 数据源 - RSS 订阅（赚钱机会源）
# ===============================================================
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1
  feeds:
    # 核心赚钱信息源：Product Hunt 每日新品（老外付费产品，可模仿/联盟）
    - id: "producthunt"
      name: "Product Hunt"
      url: "https://www.producthunt.com/feed?page=1"
      enabled: true

    # 备用源（可选开启）：
    # - id: "hacker-news"
    #   name: "Hacker News (Show HN)"
    #   url: "https://hnrss.org/show"
    #
    # - id: "angel-list"
    #   name: "AngelList Funding"
    #   url: "https://angel.co/feed"


# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  mode: "current"                     # 只推送当前有新品的内容
  display_mode: "keyword"             # 按关键词分组
  sort_by_position_first: true        # 按关键词优先级排序
  rank_threshold: 3
  max_news_per_keyword: 0


# ===============================================================
# 5. 筛选策略 —— 使用关键词过滤（MVP 不走 AI）
# ===============================================================
filter:
  method: "keyword"                   # keyword | ai（先用 keyword）


# ===============================================================
# 6. 推送区域控制
# ===============================================================
display:
  region_order:
    - new_items                       # 新增内容（最重要）
    - hotlist                         # 关键词匹配的热门
    - rss                             # RSS 汇总
  regions:
    hotlist: true                     # 启用关键词匹配
    new_items: true                   # 显示新增标记
    rss: true                         # RSS 内容
    standalone: false                 # MVP 暂不开启独立展示
    ai_analysis: false                # MVP 暂不开启 AI 分析（节省成本）


# ===============================================================
# 7. 推送通知 —— 只推飞书（需配置 Secrets）
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""                 # 在 GitHub Secrets 中填入 FEISHU_WEBHOOK


# ===============================================================
# 8. 存储配置
# ===============================================================
storage:
  backend: "auto"                    # GitHub Actions 环境自动用 remote
  formats:
    sqlite: true
    txt: false
    html: true                       # 保留网页报告
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""                 # 留空，用 GitHub Secrets 配置
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""


# ===============================================================
# 9. AI 模型配置（MVP 不启用）
# ===============================================================
ai:
  model: "deepseek/deepseek-chat"
  api_key: ""                        # 用 Secrets: AI_API_KEY
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1


# ===============================================================
# 10. AI 分析（MVP 关闭）
# ===============================================================
ai_analysis:
  enabled: false


# ===============================================================
# 11. AI 翻译（MVP 关闭）
# ===============================================================
ai_translation:
  enabled: false


# ===============================================================
# 12. 高级设置
# ===============================================================
advanced:
  debug: false
  crawler:
    request_interval: 2000
    use_proxy: false
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  batch_size:
    default: 4000
    feishu: 30000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"